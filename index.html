<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlacierPOS - Sales Invoice</title>
    <style>
        :root { --primary: #1a73e8; --success: #27ae60; --dark: #2c3e50; --light: #f4f7f6; --border: #dcdde1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 20px; color: var(--dark); }
        .invoice-container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Header section */
        .header-section { display: flex; justify-content: space-between; border-bottom: 2px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        .header-section h1 { margin: 0; color: var(--primary); font-size: 28px; }
        
        /* Customer details */
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 5px; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; }
        
        /* Item Entry Box */
        .item-entry { background: #f8f9fa; padding: 15px; border-radius: 6px; border: 1px dashed #ccc; margin-bottom: 20px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; height: 38px; }
        .btn-add:hover { background: #1557b0; }

        /* The Table */
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; }
        th { background-color: var(--primary); color: white; }
        .td-right { text-align: right; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        /* Summary Section */
        .summary-section { display: flex; justify-content: flex-end; }
        .summary-box { width: 350px; background: #fdfdfd; border: 1px solid var(--border); border-radius: 6px; padding: 15px; }
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 15px; }
        .summary-row.grand-total { font-size: 20px; font-weight: bold; color: var(--primary); border-bottom: none; border-top: 2px solid var(--primary); margin-top: 10px; padding-top: 15px; }

        /* Action Buttons */
        .actions { display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px; }
        .btn-save { background: var(--success); color: white; padding: 12px 25px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-print { background: #7f8c8d; color: white; padding: 12px 25px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* PRINT STYLES - This hides inputs when you click Print! */
        @media print {
            body { background: white; padding: 0; }
            .invoice-container { box-shadow: none; border: none; padding: 0; }
            .item-entry, .actions, .btn-delete, select { display: none !important; }
            input { border: none; background: transparent; outline: none; padding: 0; font-size: 16px; }
            .form-group { margin-bottom: 5px; }
        }
    </style>
</head>
<body>

<div class="invoice-container">
    <div class="header-section">
        <div>
            <h1>🍦 Glacier Ice Cream Parlor</h1>
            <p style="margin: 5px 0; color: #7f8c8d;">Tax Invoice / Bill of Supply</p>
        </div>
        <div style="text-align: right;">
            <p style="margin: 5px 0;"><strong>Date:</strong> <span id="currentDate"></span></p>
            <p style="margin: 5px 0;"><strong>State:</strong> Rajasthan (08)</p>
        </div>
    </div>

    <!-- Customer Info -->
    <div class="grid-3">
        <div class="form-group">
            <label>Customer Name</label>
            <input type="text" id="custName" placeholder="Cash / Customer Name">
        </div>
        <div class="form-group">
            <label>Customer GSTIN (Optional)</label>
            <input type="text" id="custGstin" placeholder="e.g. 08AAAAA0000A1Z5">
        </div>
        <div class="form-group">
            <label>Place of Supply</label>
            <select id="posLocation" onchange="calculateTotals()">
                <option value="local">08 - Rajasthan (CGST+SGST)</option>
                <option value="interstate">Other State (IGST)</option>
            </select>
        </div>
    </div>

    <!-- Add Item Bar -->
    <div class="item-entry">
        <div class="form-group"><label>Item / Description</label><input type="text" id="inItem" placeholder="Item Name"></div>
        <div class="form-group"><label>HSN</label><input type="text" id="inHsn" placeholder="e.g. 2105"></div>
        <div class="form-group"><label>Qty</label><input type="number" id="inQty" value="1" min="1"></div>
        <div class="form-group"><label>Rate (₹)</label><input type="number" id="inRate" placeholder="0.00"></div>
        <div class="form-group">
            <label>GST %</label>
            <select id="inGst">
                <option value="5">5%</option>
                <option value="12">12%</option>
                <option value="18" selected>18%</option>
                <option value="28">28%</option>
            </select>
        </div>
        <button class="btn-add" onclick="addItem()">+ Add Item</button>
    </div>

    <!-- Invoice Table -->
    <table id="invoiceTable">
        <thead>
            <tr>
                <th width="5%">#</th>
                <th width="40%">Item Description</th>
                <th width="10%">HSN</th>
                <th width="10%" class="td-right">Qty</th>
                <th width="15%" class="td-right">Rate</th>
                <th width="10%" class="td-right">GST</th>
                <th width="10%" class="td-right">Amount</th>
                <th width="5%" style="text-align:center;">X</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Items will appear here dynamically -->
        </tbody>
    </table>

    <!-- Totals Summary -->
    <div class="summary-section">
        <div class="summary-box">
            <div class="summary-row"><span>Total Taxable Value:</span> <span id="sumTaxable">₹0.00</span></div>
            <div class="summary-row"><span>CGST:</span> <span id="sumCgst">₹0.00</span></div>
            <div class="summary-row"><span>SGST:</span> <span id="sumSgst">₹0.00</span></div>
            <div class="summary-row"><span>IGST:</span> <span id="sumIgst">₹0.00</span></div>
            <div class="summary-row grand-total"><span>Grand Total:</span> <span id="sumTotal">₹0.00</span></div>
        </div>
    </div>

    <!-- Actions -->
    <div class="actions">
        <button class="btn-print" onclick="window.print()">🖨️ Print Invoice</button>
        <button class="btn-save" id="saveBtn" onclick="saveToFirebase()">💾 Save to System</button>
    </div>
</div>

<!-- FIREBASE SCRIPTS -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDdwv7T9NNfLBg9_Mr6r_crbcK00xcyrGU",
        authDomain: "glacierpos-35f4c.firebaseapp.com",
        projectId: "glacierpos-35f4c",
        storageBucket: "glacierpos-35f4c.firebasestorage.app",
        messagingSenderId: "46444555909",
        appId: "1:46444555909:web:50430006771bd52eaf83ec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Set today's date on the UI
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-IN');

    // Array to hold all line items
    window.billItems = [];

    // 1. ADD ITEM TO TABLE
    window.addItem = function() {
        const name = document.getElementById('inItem').value;
        const hsn = document.getElementById('inHsn').value;
        const qty = parseFloat(document.getElementById('inQty').value) || 1;
        const rate = parseFloat(document.getElementById('inRate').value);
        const gstPercent = parseFloat(document.getElementById('inGst').value);

        if (!name || !rate) {
            alert("Please enter Item Name and Rate.");
            return;
        }

        const taxableAmount = qty * rate;
        const taxAmount = (taxableAmount * gstPercent) / 100;

        const itemObj = {
            name: name,
            hsn: hsn || "N/A",
            qty: qty,
            rate: rate,
            gstPercent: gstPercent,
            taxableValue: taxableAmount,
            taxAmount: taxAmount
        };

        window.billItems.push(itemObj);
        
        // Clear input fields
        document.getElementById('inItem').value = "";
        document.getElementById('inHsn').value = "";
        document.getElementById('inQty').value = "1";
        document.getElementById('inRate').value = "";
        document.getElementById('inItem').focus();

        renderTable();
    };

    // 2. REMOVE ITEM FROM TABLE
    window.removeItem = function(index) {
        window.billItems.splice(index, 1);
        renderTable();
    };

    // 3. DRAW THE TABLE AND CALCULATE TOTALS
    window.renderTable = function() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ""; // Clear existing rows
        
        let totalTaxable = 0;
        let totalTax = 0;

        window.billItems.forEach((item, index) => {
            totalTaxable += item.taxableValue;
            totalTax += item.taxAmount;

            const row = `<tr>
                <td>${index + 1}</td>
                <td>${item.name}</td>
                <td>${item.hsn}</td>
                <td class="td-right">${item.qty}</td>
                <td class="td-right">₹${item.rate.toFixed(2)}</td>
                <td class="td-right">${item.gstPercent}%</td>
                <td class="td-right">₹${item.taxableValue.toFixed(2)}</td>
                <td style="text-align:center;"><button class="btn-delete" onclick="removeItem(${index})">X</button></td>
            </tr>`;
            tbody.innerHTML += row;
        });

        calculateTotals(totalTaxable, totalTax);
    };

    // 4. CALCULATE GST SPLIT (CGST/SGST/IGST)
    window.calculateTotals = function(forcedTaxable = null, forcedTax = null) {
        // If no items, calculate from scratch
        let base = forcedTaxable;
        let tax = forcedTax;
        
        if (base === null) {
            base = window.billItems.reduce((sum, item) => sum + item.taxableValue, 0);
            tax = window.billItems.reduce((sum, item) => sum + item.taxAmount, 0);
        }

        const isLocal = document.getElementById('posLocation').value === 'local';
        let cgst = 0, sgst = 0, igst = 0;

        if (isLocal) {
            cgst = tax / 2;
            sgst = tax / 2;
        } else {
            igst = tax;
        }

        const grandTotal = base + tax;

        // Update UI
        document.getElementById('sumTaxable').innerText = `₹${base.toFixed(2)}`;
        document.getElementById('sumCgst').innerText = `₹${cgst.toFixed(2)}`;
        document.getElementById('sumSgst').innerText = `₹${sgst.toFixed(2)}`;
        document.getElementById('sumIgst').innerText = `₹${igst.toFixed(2)}`;
        document.getElementById('sumTotal').innerText = `₹${grandTotal.toFixed(2)}`;

        // Save these globally so Firebase can grab them
        window.currentBillTotals = { base, cgst, sgst, igst, grandTotal };
    };

    // 5. SAVE TO FIREBASE
    window.saveToFirebase = async function() {
        if (window.billItems.length === 0) {
            alert("Cannot save an empty invoice. Please add items.");
            return;
        }

        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = "⏳ Saving...";
        saveBtn.disabled = true;

        const customerName = document.getElementById('custName').value || "Cash Customer";
        const customerGstin = document.getElementById('custGstin').value || "Unregistered";
        const location = document.getElementById('posLocation').value;
        const totals = window.currentBillTotals;

        // We format the data to perfectly match what reports.html expects!
        const payload = {
            customerName: customerName,
            customerGstin: customerGstin,
            location: location,
            items: window.billItems, // Save the full array of items
            
            // These exact fields allow your existing reports.html to still work!
            taxableValue: totals.base,
            cgst: totals.cgst,
            sgst: totals.sgst,
            igst: totals.igst,
            totalBill: totals.grandTotal,
            
            date: new Date().toISOString(),
            quarter: "Q1-2026"
        };

        try {
            const docRef = await addDoc(collection(db, "invoices"), payload);
            alert(`✔ Invoice Saved Successfully! \nInvoice ID: ${docRef.id}`);
            
            // Reset the form for the next customer
            window.billItems = [];
            renderTable();
            document.getElementById('custName').value = "";
            document.getElementById('custGstin').value = "";
            saveBtn.innerText = "💾 Save to System";
            saveBtn.disabled = false;

        } catch (error) {
            console.error("Error saving document: ", error);
            alert("Error saving invoice. Check console.");
            saveBtn.innerText = "💾 Save to System";
            saveBtn.disabled = false;
        }
    };
</script>

</body>
</html>
