<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlacierPOS - GST Dashboard & Filing</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #2c3e50; border-bottom: 3px solid #f39c12; padding-bottom: 10px; margin-bottom: 30px; text-align: center;}
        
        .dashboard { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 900px; width: 100%; }
        
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); flex: 1; min-width: 250px; }
        .card h3 { margin-top: 0; color: #7f8c8d; font-size: 16px; text-transform: uppercase; }
        .card .amount { font-size: 28px; font-weight: bold; margin: 10px 0; }
        
        .sales-card { border-top: 5px solid #3498db; }
        .sales-card .amount { color: #2980b9; }
        
        .itc-card { border-top: 5px solid #27ae60; }
        .itc-card .amount { color: #27ae60; }
        
        .net-card { border-top: 5px solid #e74c3c; background-color: #fdf5f5;}
        .net-card .amount { color: #c0392b; }

        .controls { display: flex; gap: 15px; margin-bottom: 20px; }
        button { border: none; padding: 12px 25px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: background 0.3s;}
        .btn-refresh { background-color: #f39c12; color: white; }
        .btn-refresh:hover { background-color: #e67e22; }
        .btn-json { background-color: #8e44ad; color: white; }
        .btn-json:hover { background-color: #732d91; }
        .btn-download { background-color: #27ae60; color: white; margin-top: 15px; display: none; }
        .btn-download:hover { background-color: #2ecc71; }
        
        .details { font-size: 14px; color: #555; line-height: 1.6; border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px;}
        
        .json-box { width: 100%; max-width: 900px; background: #2c3e50; color: #a6e22e; padding: 20px; border-radius: 12px; margin-top: 30px; display: none; overflow-x: auto; box-sizing: border-box;}
        .json-box h3 { color: #fff; margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 10px; }
        pre { font-family: 'Courier New', Courier, monospace; font-size: 14px; margin: 0; }
    </style>
</head>
<body>

    <h1>📊 GST Reconciliation & Filing</h1>
    
    <div class="controls">
        <button class="btn-refresh" onclick="loadData()">🔄 Fetch Latest Data</button>
        <button class="btn-json" onclick="generateJSON()">📤 Generate GSTR-3B JSON</button>
    </div>

    <div class="dashboard">
        <!-- OUTPUT TAX (SALES) -->
        <div class="card sales-card">
            <h3>Total Output Tax (Sales)</h3>
            <div class="amount" id="outTotal">₹0.00</div>
            <div class="details" id="outDetails">
                CGST: ₹0.00 <br> SGST: ₹0.00 <br> IGST: ₹0.00
            </div>
        </div>

        <!-- INPUT TAX CREDIT (PURCHASES) -->
        <div class="card itc-card">
            <h3>Available ITC (Purchases)</h3>
            <div class="amount" id="itcTotal">₹0.00</div>
            <div class="details" id="itcDetails">
                CGST: ₹0.00 <br> SGST: ₹0.00 <br> IGST: ₹0.00
            </div>
        </div>

        <!-- NET PAYABLE -->
        <div class="card net-card">
            <h3>Net GST Payable (PMT-06)</h3>
            <div class="amount" id="netTotal">₹0.00</div>
            <div class="details" id="netDetails">
                Click "Fetch Latest Data" to calculate.
            </div>
        </div>
    </div>

    <!-- JSON OUTPUT AREA -->
    <div class="json-box" id="jsonBox">
        <h3>Government API Payload (GSTR-3B)</h3>
        <pre id="jsonOutput"></pre>
        <!-- NEW DOWNLOAD BUTTON -->
        <button id="downloadBtn" class="btn-download" onclick="downloadFile()">💾 Download .json File</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDdwv7T9NNfLBg9_Mr6r_crbcK00xcyrGU",
            authDomain: "glacierpos-35f4c.firebaseapp.com",
            projectId: "glacierpos-35f4c",
            storageBucket: "glacierpos-35f4c.firebasestorage.app",
            messagingSenderId: "46444555909",
            appId: "1:46444555909:web:50430006771bd52eaf83ec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.gstData = {
            salesTaxableVal: 0, outCGST: 0, outSGST: 0, outIGST: 0,
            itcCGST: 0, itcSGST: 0, itcIGST: 0
        };

        window.loadData = async function() {
            const btn = document.querySelector('.btn-refresh');
            btn.innerText = "⏳ Calculating...";
            
            window.gstData = { salesTaxableVal: 0, outCGST: 0, outSGST: 0, outIGST: 0, itcCGST: 0, itcSGST: 0, itcIGST: 0 };

            try {
                const salesSnapshot = await getDocs(collection(db, "invoices"));
                salesSnapshot.forEach((doc) => {
                    const data = doc.data();
                    window.gstData.salesTaxableVal += data.taxableValue || 0;
                    window.gstData.outCGST += data.cgst || 0;
                    window.gstData.outSGST += data.sgst || 0;
                    window.gstData.outIGST += data.igst || 0;
                });
                const totalOutput = window.gstData.outCGST + window.gstData.outSGST + window.gstData.outIGST;

                const purchasesSnapshot = await getDocs(collection(db, "purchases"));
                purchasesSnapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.itcEligible) {
                        window.gstData.itcCGST += data.cgstPaid || 0;
                        window.gstData.itcSGST += data.sgstPaid || 0;
                        window.gstData.itcIGST += data.igstPaid || 0;
                    }
                });
                const totalITC = window.gstData.itcCGST + window.gstData.itcSGST + window.gstData.itcIGST;

                const netCGST = Math.max(0, window.gstData.outCGST - window.gstData.itcCGST);
                const netSGST = Math.max(0, window.gstData.outSGST - window.gstData.itcSGST);
                const netIGST = Math.max(0, window.gstData.outIGST - window.gstData.itcIGST);
                const totalNet = netCGST + netSGST + netIGST;

                document.getElementById('outTotal').innerText = `₹${totalOutput.toFixed(2)}`;
                document.getElementById('outDetails').innerHTML = `Taxable Sales: ₹${window.gstData.salesTaxableVal.toFixed(2)}<hr style="border:0; border-top:1px dashed #ccc; margin:5px 0;">CGST: ₹${window.gstData.outCGST.toFixed(2)} <br> SGST: ₹${window.gstData.outSGST.toFixed(2)} <br> IGST: ₹${window.gstData.outIGST.toFixed(2)}`;

                document.getElementById('itcTotal').innerText = `₹${totalITC.toFixed(2)}`;
                document.getElementById('itcDetails').innerHTML = `CGST: ₹${window.gstData.itcCGST.toFixed(2)} <br> SGST: ₹${window.gstData.itcSGST.toFixed(2)} <br> IGST: ₹${window.gstData.itcIGST.toFixed(2)}`;

                document.getElementById('netTotal').innerText = `₹${totalNet.toFixed(2)}`;
                
                if (totalITC > totalOutput) {
                    document.getElementById('netDetails').innerHTML = `<span style="color: #27ae60; font-weight: bold;">Excess ITC carried forward!</span>`;
                } else {
                    document.getElementById('netDetails').innerHTML = `Pay via PMT-06 Challan:<br> CGST: ₹${netCGST.toFixed(2)} <br> SGST: ₹${netSGST.toFixed(2)} <br> IGST: ₹${netIGST.toFixed(2)}`;
                }

                btn.innerText = "🔄 Fetch Latest Data";
                document.getElementById('jsonBox').style.display = "none";
                document.getElementById('downloadBtn').style.display = "none";

            } catch (error) {
                console.error("Error fetching data: ", error);
                alert("Could not load data. Check console.");
                btn.innerText = "🔄 Try Again";
            }
        };

        window.generateJSON = function() {
            if (window.gstData.salesTaxableVal === 0 && window.gstData.itcCGST === 0) {
                alert("Please click 'Fetch Latest Data' first.");
                return;
            }

            const gstr3bPayload = {
                "gstin": "08AAAAA0000A1Z5", 
                "ret_period": "062026",       
                
                "sup_details": {
                    "osup_det": {
                        "txval": parseFloat(window.gstData.salesTaxableVal.toFixed(2)),
                        "iamt": parseFloat(window.gstData.outIGST.toFixed(2)),
                        "camt": parseFloat(window.gstData.outCGST.toFixed(2)),
                        "samt": parseFloat(window.gstData.outSGST.toFixed(2)),
                        "csamt": 0.00
                    }
                },
                
                "itc_elg": {
                    "itc_avl": [
                        {
                            "ty": "ALL_OTHER_ITC",
                            "iamt": parseFloat(window.gstData.itcIGST.toFixed(2)),
                            "camt": parseFloat(window.gstData.itcCGST.toFixed(2)),
                            "samt": parseFloat(window.gstData.itcSGST.toFixed(2)),
                            "csamt": 0.00
                        }
                    ]
                }
            };

            const jsonString = JSON.stringify(gstr3bPayload, null, 4);
            document.getElementById('jsonOutput').innerText = jsonString;
            document.getElementById('jsonBox').style.display = "block";
            
            // Show the download button
            document.getElementById('downloadBtn').style.display = "inline-block";
            
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };

        // --- NEW DOWNLOAD FUNCTION ---
        window.downloadFile = function() {
            // 1. Grab the text from the screen
            const textToSave = document.getElementById('jsonOutput').innerText;
            
            // 2. Turn it into a "Blob" (a fake file in the browser's memory)
            const blob = new Blob([textToSave], { type: "application/json" });
            
            // 3. Create a temporary, invisible link
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            
            // Name the file dynamically based on the date
            a.download = `GlacierPOS_GSTR3B_${new Date().toISOString().split('T')[0]}.json`;
            
            // 4. Click the invisible link to force the browser download
            document.body.appendChild(a);
            a.click();
            
            // Clean up the invisible link
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        window.onload = loadData;
    </script>
</body>
</html>
